<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Pencil — Property Development Feasibility Engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F1EA"/>
      <stop offset="1" stop-color="#EBE6DB"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#CFC7B5" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top rule -->
  <rect x="80" y="80" width="1040" height="2" fill="#0E1012"/>

  <!-- Pencil mark (mirrors the in-app PencilMark) -->
  <g transform="translate(80,140)">
    <rect x="0" y="30" width="120" height="28" fill="none" stroke="#0E1012" stroke-width="3"/>
    <rect x="120" y="30" width="16" height="28" fill="#0E1012"/>
    <polygon points="136,30 168,44 136,58" fill="#C48A3C"/>
    <line x1="0" y1="86" x2="148" y2="86" stroke="#0E1012" stroke-width="2.5"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="80" y="320" font-family="'IBM Plex Sans', system-ui, sans-serif" font-weight="600" font-size="120" letter-spacing="-3" fill="#0E1012">Pencil</text>
  <text x="80" y="370" font-family="'IBM Plex Mono', monospace" font-size="22" letter-spacing="6" fill="#6A6558">FEASIBILITY · ENGINE</text>

  <!-- Headline -->
  <text x="80" y="450" font-family="'IBM Plex Sans', system-ui, sans-serif" font-weight="500" font-size="38" fill="#0E1012">Property development feasibility — in the browser.</text>
  <text x="80" y="498" font-family="'IBM Plex Sans', system-ui, sans-serif" font-weight="400" font-size="26" fill="#6A6558">Cashflow · GST · Senior debt · IRR · Equity waterfall</text>

  <!-- Bottom rule + KPI strip -->
  <rect x="80" y="540" width="1040" height="1" fill="#CFC7B5"/>
  <g font-family="'IBM Plex Mono', monospace" font-size="20" fill="#0E1012">
    <text x="80" y="580">IRR</text>
    <text x="80" y="600" font-size="14" fill="#6A6558">22.7%</text>

    <text x="260" y="580">PROFIT</text>
    <text x="260" y="600" font-size="14" fill="#6A6558">$170M</text>

    <text x="460" y="580">PEAK DEBT</text>
    <text x="460" y="600" font-size="14" fill="#6A6558">$767M</text>

    <text x="700" y="580">GRV</text>
    <text x="700" y="600" font-size="14" fill="#6A6558">$1.26B</text>

    <text x="900" y="580">DSCR</text>
    <text x="900" y="600" font-size="14" fill="#6A6558">1.25× target</text>
  </g>

  <!-- Ochre accent -->
  <rect x="0" y="0" width="8" height="630" fill="#C48A3C"/>
</svg>
