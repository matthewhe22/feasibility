<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#c8a951" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a951" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#c8a951" stop-opacity="1"/>
      <stop offset="70%" stop-color="#c8a951" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c8a951" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect width="1200" height="4" fill="#c8a951"/>
  <!-- Bottom accent line -->
  <rect y="626" width="360" height="4" fill="#c8a951"/>
  <rect x="840" width="360" height="4" fill="#c8a951" y="626"/>

  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">
    <tspan fill="#c8a951">Pencil</tspan> Feasibility Model
  </text>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="2">
    Property Development Financial Analysis
  </text>

  <!-- Tag -->
  <rect x="450" y="380" width="300" height="42" rx="4" fill="none" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#c8a951" letter-spacing="4">
    FEASIBILITY · ENGINE
  </text>

  <!-- Domain -->
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.25)" letter-spacing="2">
    pencil.capconnex.com.au
  </text>
</svg>
